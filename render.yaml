services:
  - type: web
    name: banff-aurora-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEATHER_API_KEY
        sync: false
